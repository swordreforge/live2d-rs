[env]
# pkg-config-rs refuses cross-compilation by default.
# x86_64-unknown-linux-musl shares the same architecture as the build host,
# so the host's ALSA .pc files work. Allow cross-mode to skip the check.
PKG_CONFIG_ALLOW_CROSS = "1"
# Locally-built libasound.a's .pc lives in /usr/local/lib/pkgconfig.
# pkg-config doesn't search that path by default on Ubuntu 24.04.
PKG_CONFIG_PATH = "/usr/local/lib/pkgconfig"

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-Wl,--allow-multiple-definition"]
